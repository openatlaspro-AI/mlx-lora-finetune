# mlx_lm.lora training config for freight-text -> JSON extraction.
# Run: python -m mlx_lm lora --config lora_config.yaml
# (or: mlx_lm.lora --config lora_config.yaml)

# Base model: 4-bit quantized Qwen2.5 (the "Q" in QLoRA). If this id 404s,
# fall back to mlx-community/Qwen2.5-1.5B-Instruct-4bit and record which was used.
model: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"

train: true
data: "data"                # directory with {train,valid,test}.jsonl
fine_tune_type: "lora"
optimizer: "adam"

num_layers: 8               # number of transformer layers to attach LoRA to
batch_size: 4
iters: 600
learning_rate: 1.0e-4
max_seq_length: 512

steps_per_report: 50
steps_per_eval: 150
val_batches: 25
save_every: 200

adapter_path: "adapters"
seed: 0

# LoRA hyperparameters
lora_parameters:
  rank: 8
  scale: 20.0
  dropout: 0.0
