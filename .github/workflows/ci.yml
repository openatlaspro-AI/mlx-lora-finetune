name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    # ruff + pytest only. Never trains (training requires Apple Silicon / MLX
    # and a model download, which CI runners don't provide).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (dev, no MLX runtime needed for tests)
        run: |
          python -m pip install --upgrade pip
          # mlx-lm is Apple-Silicon only and not importable in the unit tests
          # (eval.py imports it lazily inside the model-running functions), so we
          # install the package without its deps plus just what the tests need.
          pip install ruff pytest pydantic
          pip install -e . --no-deps

      - name: Ruff
        run: ruff check .

      - name: Pytest (network-free unit tests)
        run: pytest
